name: Build

on:
  push:
    branches: [master]
  release:
    types: [created]

env:
  FFMPEG_VERSION: "7.1"
  FFMPEG_SHA256: "40973d44970dbc83ef302b0609f2e74982be2d85916dd2ee7472d30678a7abe6"
  LIBWEBP_VERSION: "1.4.0"
  LIBWEBP_SHA256: "61f873ec69e3be1b99535634340d5bde750b2e4447caa1db9f61be3fd49ab1e5"
  # Minimal set of components needed for video thumbnail extraction.
  FFMPEG_OPTS: >-
    --disable-everything
    --enable-avformat
    --enable-avcodec
    --enable-avutil
    --enable-swscale
    --enable-swresample
    --enable-decoder=h264,hevc,vp8,vp9,av1,mpeg4,mpeg1video,mpeg2video,msmpeg4v3,mjpeg,theora,vp6,flv,rv10,rv20,rv30,rv40,png,bmp,gif,tiff,webp
    --enable-demuxer=mov,matroska,avi,mpeg,mpegps,mpegvideo,mpegts,ogg,flv,rm,asf,image2,gif,image_png_pipe,image_bmp_pipe,image_webp_pipe,image_tiff_pipe
    --enable-parser=av1,h264,hevc,vp9,mpeg4video,mpegvideo,png,webp
    --enable-bsf=av1_frame_merge
    --enable-protocol=file
    --enable-libwebp
    --enable-encoder=libwebp
    --enable-muxer=webp
    --enable-filter=scale
    --enable-static
    --disable-shared
    --enable-pic
    --enable-lto
    --disable-ffmpeg
    --disable-ffplay
    --disable-ffprobe
    --disable-doc

jobs:
  # ── build native lib on each platform ──────────────────────────────────────
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
            lib: thumbnailer.so
            extra_cflags: "--extra-cflags=-fPIC"
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            lib: thumbnailer.so
            extra_cflags: ""
          - os: macos-15-intel
            platform: macos-x86_64
            lib: thumbnailer.dylib
            extra_cflags: ""
          - os: macos-14
            platform: macos-aarch64
            lib: thumbnailer.dylib
            extra_cflags: ""
          - os: windows-latest
            platform: windows-x86_64
            lib: thumbnailer.dll

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # ── Linux / macOS ───────────────────────────────────────────────────────
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake pkg-config nasm ant

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config nasm ant

      - name: Build libwebp (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          PREFIX=$(pwd)/ffmpeg-build
          curl -fsSL https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-${{ env.LIBWEBP_VERSION }}.tar.gz -o libwebp.tar.gz
          echo "${{ env.LIBWEBP_SHA256 }}  libwebp.tar.gz" | (sha256sum -c - 2>/dev/null || shasum -a 256 -c -)
          tar xzf libwebp.tar.gz
          cd libwebp-${{ env.LIBWEBP_VERSION }}
          CFLAGS="-fPIC -flto" ./configure --prefix="$PREFIX" \
            --enable-static --disable-shared \
            --disable-libwebpmux --disable-libwebpdemux \
            --disable-libwebpdecoder --disable-libwebpextras \
            --disable-gif --disable-jpeg --disable-png --disable-tiff --disable-wic
          make -j$NPROC install

      - name: Build FFmpeg (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          PREFIX=$(pwd)/ffmpeg-build
          curl -fsSL https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz -o ffmpeg.tar.xz
          echo "${{ env.FFMPEG_SHA256 }}  ffmpeg.tar.xz" | (sha256sum -c - 2>/dev/null || shasum -a 256 -c -)
          tar xJf ffmpeg.tar.xz
          cd ffmpeg-${{ env.FFMPEG_VERSION }}
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
          ./configure --prefix="$PREFIX" \
            --pkg-config-flags="--static" \
            ${{ matrix.extra_cflags }} \
            ${{ env.FFMPEG_OPTS }}
          make -j$NPROC install

      - name: Build native lib (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DFFMPEG_ROOT=$(pwd)/ffmpeg-build
          cmake --build build --config Release
          mkdir -p resources/native/${{ matrix.platform }}
          find build -name "thumbnailer.*" \( -name "*.so" -o -name "*.dylib" \) \
            -exec cp {} resources/native/${{ matrix.platform }}/${{ matrix.lib }} \;
          LIB=resources/native/${{ matrix.platform }}/${{ matrix.lib }}
          if [ "${{ runner.os }}" = "macOS" ]; then
            strip -x "$LIB"
          else
            strip --strip-unneeded "$LIB"
          fi

      # ── Windows (MSYS2 + MinGW) ─────────────────────────────────────────────
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-bzip2
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-xz
            mingw-w64-x86_64-zlib
            make

      - name: Build libwebp (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          curl -fsSL https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-${{ env.LIBWEBP_VERSION }}.tar.gz -o libwebp.tar.gz
          echo "${{ env.LIBWEBP_SHA256 }}  libwebp.tar.gz" | (sha256sum -c - 2>/dev/null || shasum -a 256 -c -)
          tar xzf libwebp.tar.gz
          cd libwebp-${{ env.LIBWEBP_VERSION }}
          CFLAGS=-flto ./configure --prefix=$(pwd)/../ffmpeg-build \
            --enable-static --disable-shared \
            --disable-libwebpmux --disable-libwebpdemux \
            --disable-libwebpdecoder --disable-libwebpextras \
            --disable-gif --disable-jpeg --disable-png --disable-tiff --disable-wic
          make -j$(nproc) install

      - name: Build FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          curl -fsSL https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz -o ffmpeg.tar.xz
          echo "${{ env.FFMPEG_SHA256 }}  ffmpeg.tar.xz" | (sha256sum -c - 2>/dev/null || shasum -a 256 -c -)
          tar xJf ffmpeg.tar.xz
          cd ffmpeg-${{ env.FFMPEG_VERSION }}
          export PKG_CONFIG_PATH="$(pwd)/../ffmpeg-build/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
          ./configure --prefix=$(pwd)/../ffmpeg-build \
            --target-os=mingw32 \
            --arch=x86_64 \
            --pkg-config-flags="--static" \
            ${{ env.FFMPEG_OPTS }}
          make -j$(nproc) install

      - name: Build native lib (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -B build \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DFFMPEG_ROOT=$(pwd)/ffmpeg-build
          cmake --build build --config Release
          mkdir -p resources/native/${{ matrix.platform }}
          cp build/thumbnailer.dll resources/native/${{ matrix.platform }}/
          strip resources/native/${{ matrix.platform }}/thumbnailer.dll

      # ── run tests ───────────────────────────────────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        run: ant test

      # ── upload native lib as artifact ────────────────────────────────────────
      - name: Upload native lib
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform }}
          path: resources/native/

  # ── assemble JAR from all native libs ──────────────────────────────────────
  jar:
    needs: native
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download all native libs
        uses: actions/download-artifact@v8
        with:
          path: resources/native/
          pattern: native-*
          merge-multiple: true

      - name: Build JAR
        run: |
          SOURCE_DATE_EPOCH=0 ant jar
          echo "Native libs included:"
          jar tf thumbnailer.jar | grep native/

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: thumbnailer.jar
          path: thumbnailer.jar

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: thumbnailer.jar
